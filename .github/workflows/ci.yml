name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: github.workflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calidad:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          cache: 'npm'

      - name: Instalar dependencias raíz
        run: npm ci

      - name: Instalar dependencias del cliente
        run: npm --prefix cliente ci

      - name: Instalar dependencias del servicio usuario
        run: npm --prefix servicios/servicio-usuario ci

      - name: Generar Prisma Client
        run: npm --prefix servicios/servicio-usuario run prisma:generate

      - name: Verificar formato
        run: npm run format:check || true

      - name: Analisis estatico
        run: npm run lint || true

      - name: Auditoria de seguridad
        run: npm audit --audit-level=high || true

      - name: Pruebas con cobertura
        run: npm test

      - name: Build
        run: npm run build || true